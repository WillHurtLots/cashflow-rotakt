<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROTAKT — Cashflow</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f4f6f9;
  --white: #ffffff;
  --border: #d1d9e0;
  --border-light: #e8edf2;
  --text: #1a1f2e;
  --text2: #4a5568;
  --text3: #8896a7;
  --brand: #1a56db;
  --brand-dark: #1e3a8a;
  --green: #0e7c3a;
  --green-bg: #f0faf4;
  --red: #c0392b;
  --red-bg: #fff5f5;
  --red-light: #ffe0de;
  --orange: #c05621;
  --blue-row: #eef4ff;
  --gray-row: #f8fafc;
  --header-bg: #1e2d4a;
  --cat-bg: #e8f0fe;
  --subcat-color: #2d3748;
  --total-bg: #dbeafe;
  --total-border: #93c5fd;
  --flux-neg: #c0392b;
  --flux-pos: #0e7c3a;
  --sold-neg: #c0392b;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Calibri', Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 13px;
  min-height: 100vh;
}

/* ── HEADER ── */
.top-bar {
  background: var(--header-bg);
  padding: 0 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 52px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,.2);
}
.top-bar-left { display: flex; align-items: center; gap: 20px; }
.logo { font-size: 17px; font-weight: 800; color: #fff; letter-spacing: -.02em; }
.logo span { color: #60a5fa; }
.page-title { font-size: 13px; font-weight: 500; color: rgba(255,255,255,.55); border-left: 1px solid rgba(255,255,255,.15); padding-left: 20px; }
.top-bar-right { display: flex; align-items: center; gap: 8px; }

/* Year pills */
.yr-group { display: flex; background: rgba(255,255,255,.08); border-radius: 8px; padding: 3px; gap: 2px; }
.yr-btn {
  padding: 5px 16px; border-radius: 6px; border: none; cursor: pointer;
  font-size: 12px; font-weight: 700; background: none;
  color: rgba(255,255,255,.45); transition: .15s; letter-spacing: .02em;
}
.yr-btn:hover { color: rgba(255,255,255,.8); background: rgba(255,255,255,.08); }
.yr-btn.active { background: var(--brand); color: #fff; box-shadow: 0 1px 4px rgba(26,86,219,.5); }

/* ── KPI STRIP ── */
.kpi-strip {
  display: flex; gap: 1px; background: var(--border);
  border-bottom: 1px solid var(--border);
}
.kpi-item {
  flex: 1; background: var(--white);
  padding: 14px 20px;
  display: flex; flex-direction: column; gap: 4px;
}
.kpi-lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--text3); }
.kpi-val { font-size: 20px; font-weight: 800; letter-spacing: -.02em; }
.kpi-sub { font-size: 11px; color: var(--text3); }
.kpi-delta { display: inline-flex; align-items: center; gap: 2px; font-size: 11px; font-weight: 700; padding: 1px 7px; border-radius: 20px; }
.delta-up   { background: var(--green-bg); color: var(--green); }
.delta-dn   { background: var(--red-bg); color: var(--red); }
.delta-warn { background: #fff8ec; color: #b45309; }

/* ── ALERT ── */
.alert-bar {
  background: #fff3cd; border-bottom: 2px solid #f59e0b;
  padding: 10px 24px;
  display: flex; align-items: center; gap: 10px;
  font-size: 12px; color: #78350f;
}
.alert-bar strong { font-weight: 700; }
.alert-close { margin-left: auto; background: none; border: none; cursor: pointer; font-size: 18px; color: #92400e; line-height: 1; }

/* ── TABLE CONTAINER ── */
.table-container {
  overflow: auto;
  margin: 16px;
  border-radius: 10px;
  border: 1px solid var(--border);
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
  background: var(--white);
}

/* ── CASHFLOW TABLE ── */
.cf-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12.5px;
  min-width: 1000px;
}

/* Column widths */
.cf-table col.c-label { width: 320px; }
.cf-table col.c-month { width: 72px; }
.cf-table col.c-total { width: 80px; }

/* Sticky first column */
.cf-table th:first-child,
.cf-table td:first-child {
  position: sticky; left: 0; z-index: 2;
}

/* HEADER ROW */
.cf-table thead th {
  padding: 10px 10px;
  text-align: center;
  font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
  background: var(--header-bg); color: rgba(255,255,255,.9);
  border-right: 1px solid rgba(255,255,255,.1);
  white-space: nowrap;
}
.cf-table thead th:first-child {
  text-align: left; background: var(--header-bg);
  font-size: 11px; color: rgba(255,255,255,.6);
  padding-left: 14px;
}
.cf-table thead th.col-total {
  background: #162238; color: rgba(255,255,255,.8);
  border-left: 2px solid rgba(255,255,255,.15);
}

/* ALL ROWS BASE */
.cf-table td {
  padding: 5px 10px;
  text-align: right;
  border-bottom: 1px solid var(--border-light);
  border-right: 1px solid var(--border-light);
  white-space: nowrap;
  font-variant-numeric: tabular-nums;
  color: var(--text2);
}
.cf-table td:first-child {
  text-align: left;
  padding-left: 14px;
  font-weight: 500;
  color: var(--text);
  background: var(--white);
  border-right: 2px solid var(--border);
}

/* ── ROW TYPES ── */

/* Section header (Incasari, Plati) */
tr.row-section td {
  background: var(--header-bg) !important;
  color: #fff !important;
  font-weight: 700;
  font-size: 12.5px;
  letter-spacing: .02em;
  border-bottom: none;
  padding-top: 7px; padding-bottom: 7px;
}
tr.row-section td:first-child {
  background: var(--header-bg) !important;
  color: #fff !important;
}
tr.row-section td.val-pos { color: #86efac !important; }
tr.row-section td.val-neg { color: #fca5a5 !important; }

/* Category (bold, light blue bg) */
tr.row-cat td {
  background: var(--cat-bg);
  font-weight: 700;
  color: var(--brand-dark);
  border-bottom: 1px solid #bfdbfe;
}
tr.row-cat td:first-child {
  background: var(--cat-bg);
  color: var(--brand-dark);
}

/* Sub-item */
tr.row-sub td:first-child {
  padding-left: 28px;
  font-weight: 400;
  color: var(--text2);
  font-size: 12px;
}
tr.row-sub td { background: var(--white); }
tr.row-sub:nth-child(even) td { background: #fafbfd; }

/* Sub-sub item (indented more) */
tr.row-sub2 td:first-child {
  padding-left: 44px;
  font-weight: 400;
  color: var(--text3);
  font-size: 11.5px;
  font-style: italic;
}
tr.row-sub2 td { background: var(--white); font-size: 11.5px; }

/* Total row */
tr.row-total td {
  background: var(--total-bg) !important;
  font-weight: 800;
  color: var(--brand-dark) !important;
  border-top: 2px solid var(--total-border);
  border-bottom: 2px solid var(--total-border);
  font-size: 13px;
}
tr.row-total td:first-child {
  background: var(--total-bg) !important;
  color: var(--brand-dark) !important;
}

/* Flux net row */
tr.row-flux td {
  background: #1e2d4a !important;
  color: #fff !important;
  font-weight: 800;
  font-size: 13px;
  border-top: 2px solid #0f172a;
  border-bottom: 1px solid #0f172a;
}
tr.row-flux td:first-child {
  background: #1e2d4a !important;
  color: #fff !important;
}
tr.row-flux td.val-pos { color: #86efac !important; }
tr.row-flux td.val-neg { color: #fca5a5 !important; }

/* Sold final row */
tr.row-sold td {
  background: #0f172a !important;
  color: #fff !important;
  font-weight: 800;
  font-size: 13.5px;
  border-top: 2px solid #334155;
}
tr.row-sold td:first-child {
  background: #0f172a !important;
  color: #fff !important;
}
tr.row-sold td.val-pos { color: #4ade80 !important; }
tr.row-sold td.val-neg { color: #f87171 !important; }

/* Sold initial row */
tr.row-sold-init td {
  background: #f1f5f9;
  font-weight: 600;
  color: var(--brand-dark);
  border-bottom: 2px solid var(--border);
}
tr.row-sold-init td:first-child {
  background: #f1f5f9;
}

/* Empty separator row */
tr.row-empty td { height: 6px; background: var(--bg); border: none; padding: 0; }
tr.row-empty td:first-child { background: var(--bg); }

/* Col total */
td.col-total {
  border-left: 2px solid var(--total-border);
  font-weight: 700;
  background: #f0f7ff !important;
  color: var(--brand-dark) !important;
}
tr.row-section td.col-total { background: #0d1b30 !important; color: rgba(255,255,255,.8) !important; }
tr.row-flux td.col-total    { background: #0f172a !important; color: #c7d2fe !important; }
tr.row-sold td.col-total    { background: #020617 !important; }
tr.row-total td.col-total   { background: #bfdbfe !important; color: var(--brand-dark) !important; }

/* Value color classes */
.val-neg { color: var(--red) !important; font-weight: 700; }
.val-pos { color: var(--green) !important; }
.val-zero { color: var(--text3) !important; }
.val-empty { color: #ccc !important; }

/* Hover */
.cf-table tbody tr:not(.row-empty):not(.row-flux):not(.row-sold):not(.row-sold-init):hover td {
  filter: brightness(.96);
}
.cf-table tbody tr.row-flux:hover td,
.cf-table tbody tr.row-sold:hover td { filter: brightness(1.1); }
</style>
</head>

/* ════════════ RENDER ════════════ */
const fmtV = v => {
  if (v === null || v === undefined) return '';
  if (v === 0) return '0';
  return Math.abs(v).toLocaleString('ro-RO');
};
const fmtTotal = v => {
  if (v === null || v === undefined || v === 0) return '—';
  return (v < 0 ? '−' : '') + Math.abs(Math.round(v)).toLocaleString('ro-RO');
};

function valClass(v, forceSign) {
  if (v === null || v === undefined || v === '') return 'val-empty';
  if (v === 0) return 'val-zero';
  if (forceSign) return v < 0 ? 'val-neg' : 'val-pos';
  return v < 0 ? 'val-neg' : '';
}

function row(type, label, data, opts = {}) {
  const { signed = false, indent = 0, totalField = true, hideZero = false, rowStyle = '' } = opts;
  const trClass = type ? `row-${type}` : '';
  const labelPad = indent ? `style="padding-left:${14 + indent}px"` : '';

  let cells = '';
  let rowTotal = 0;
  let hasData = false;

  for (let i = 0; i < 12; i++) {
    const v = data ? data[i] : null;
    const display = fmtV(v === 0 && hideZero ? null : v);
    const cls = signed ? valClass(v, true) : (v < 0 ? 'val-neg' : '');
    const negMark = v !== null && v !== undefined && v < 0 ? '−' : '';
    cells += `<td class="${cls}">${v !== null && v !== undefined ? (negMark + fmtV(Math.abs(v))) : ''}</td>`;
    if (v !== null && v !== undefined) { rowTotal += v; hasData = true; }
  }

  const totVal = totalField && hasData ? rowTotal : null;
  const totCls = ['col-total', signed ? valClass(totVal, true) : (totVal < 0 ? 'val-neg' : '')].join(' ');
  cells += `<td class="${totCls}">${totVal !== null ? fmtTotal(totVal) : ''}</td>`;

  return `<tr class="${trClass}" ${rowStyle}><td ${labelPad}>${label}</td>${cells}</tr>`;
}

function emptyRow() {
  return `<tr class="row-empty">${'<td></td>'.repeat(14)}</tr>`;
}

function render(yr) {
  const d = DATA[yr];
  const isPrev = yr === 2026;
  document.getElementById('alertBar').style.display = isPrev ? 'flex' : 'none';

  // KPI
  const ti = sum(d.inc_total), tp = sum(d.plati_total), fl = sum(d.flux_net), sf = d.sold_final[11];
  const prev = DATA[yr-1];
  const dI = prev ? Math.round((ti - sum(prev.inc_total)) / Math.abs(sum(prev.inc_total)) * 100) : null;
  const avgBurn = (() => { const neg = d.flux_net.filter(v=>v<0); return neg.length ? Math.round(Math.abs(sum(neg)/neg.length)) : 0; })();
  const runway = sf > 0 ? (sf / (tp/12)).toFixed(1) : '< 0';
  const runwayC = sf <= 0 ? 'var(--red)' : parseFloat(runway) < 3 ? 'var(--orange)' : 'var(--green)';

  document.getElementById('kpiStrip').innerHTML = `
    <div class="kpi-item">
      <div class="kpi-lbl">Sold Final ${yr}</div>
      <div class="kpi-val" style="color:${sf>=0?'#1a56db':'var(--red)'}">${fmtTotal(sf)} <span style="font-size:13px;font-weight:500;color:var(--text3)">mii lei</span></div>
      <div class="kpi-sub">Dec ${yr}</div>
    </div>
    <div class="kpi-item">
      <div class="kpi-lbl">Cash Runway</div>
      <div class="kpi-val" style="color:${runwayC}">${runway} <span style="font-size:13px;font-weight:500;color:var(--text3)">${sf>0?'luni':''}</span></div>
      <div class="kpi-sub">La rata actuală de burn</div>
    </div>
    <div class="kpi-item">
      <div class="kpi-lbl">Total Încasări</div>

      ${dI !== null ? `<div class="kpi-delta ${dI>=0?'delta-up':'delta-dn'}">${dI>=0?'▲':'▼'} ${Math.abs(dI)}% vs ${yr-1}</div>` : '<div class="kpi-sub">—</div>'}
    </div>
    <div class="kpi-item">
      <div class="kpi-lbl">Total Plăți</div>
      <div class="kpi-val" style="color:var(--red)">${fmtTotal(tp)} <span style="font-size:13px;font-weight:500;color:var(--text3)">mii</span></div>
      <div class="kpi-sub">Burn mediu: ${avgBurn.toLocaleString('ro-RO')} mii/lună</div>
    </div>
    <div class="kpi-item">
      <div class="kpi-lbl">Flux Net Cumulat</div>
      <div class="kpi-val" style="color:${fl>=0?'var(--green)':'var(--red)'}">${fmtTotal(fl)} <span style="font-size:13px;font-weight:500;color:var(--text3)">mii</span></div>
      <div class="kpi-sub">${isPrev?'Previzionat':'Realizat'} ${yr}</div>

  `;

  // TABLE

  let html = `

    </thead>

  `;

  html += row('sold-init', 'Sold inițial de numerar *', d.sold_initial, {totalField: false});
  html += emptyRow();

  // INCASARI section
  html += row('section', 'ÎNCASĂRI', d.inc_total, {signed:false});

  html += emptyRow();

  // PLATI section
  html += row('section', 'PLĂȚI', d.plati_total, {signed:false});
  html += row('sub',  'Achiziții de stocuri (Extern)',                     d.stocuri_ext);

  html += row('sub2', '446.11 — TVA în vamă',                             d.tva_vama);

  html += emptyRow();

  html += row('cat',  'Alte cheltuieli',                                   d.alte_total);

  html += row('sub2', '624 — Transport bunuri și personal',               d.c624);
  html += row('sub2', '625 — Deplasări, detașări, transferuri',           d.c625);
  html += row('sub2', '626 — Poștale și telecomunicații',                 d.c626);
  html += row('sub2', '628 — Alte servicii executate de terți',           d.c628);
  html += emptyRow();

  html += row('sub', '612 — Redevențe, locații de gestiune și chirii',    d.chirii);
  html += row('sub', 'Cheltuieli de capital',                              d.capital_chelt, {hideZero:true});
  html += row('sub', 'Retrageri de numerar de către acționari (4558)',     d.retrageri);
  html += row('sub', 'Alte cheltuieli financiare și excepționale (Leasing)', d.leasing, {hideZero:true});
  html += emptyRow();

  html += row('cat',  'Rambursarea datoriilor',                            d.ramb_total);
  html += row('sub2', 'Rambursări de capital existente (Rate credit)',     d.rate_credit);
  html += row('sub2', 'Plata dobânzilor pentru creditele existente',       d.dobanzi);
  html += row('sub2', 'Rambursări capital — noua solicitare de credit',    d.ramb_nou);
  html += row('sub2', '4411 — Impozit profit',                             d.impozit_profit);
  html += row('sub2', '627 — Cheltuieli servicii bancare și asimilate',    d.servicii_bancare);
  html += row('sub2', '4423 — TVA de plată',                              d.tva_plata);
  html += emptyRow();

  html += row('total', 'TOTAL PLĂȚI',                                      d.plati_total);
  html += emptyRow();

  // FLUX + SOLD
  html += row('flux', 'FLUXUL NET DE NUMERAR (+/−)',                      d.flux_net, {signed:true});
  html += row('sold', 'SOLD FINAL DE NUMERAR',                            d.sold_final, {signed:true});

  html += '</tbody>';
  document.getElementById('cfTable').innerHTML = html;
}
